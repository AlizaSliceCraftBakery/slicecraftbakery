<svg xmlns="http://www.w3.org/2000/svg" width="320" height="220" viewBox="0 0 320 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3A2820;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A2820dd;stop-opacity:1" />
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <rect width="320" height="220" fill="url(#bg)"/>
  <rect width="320" height="220" fill="none" opacity="0.04" filter="url(#grain)"/>
  <!-- decorative lines -->
  <line x1="32.0" y1="110" x2="288.0" y2="110" stroke="#D4A84B" stroke-width="0.5" opacity="0.3"/>
  <line x1="160" y1="33.0" x2="160" y2="187.0" stroke="#D4A84B" stroke-width="0.5" opacity="0.15"/>
  <!-- corner accents -->
  <rect x="20" y="20" width="30" height="1" fill="#D4A84B" opacity="0.5"/>
  <rect x="20" y="20" width="1" height="30" fill="#D4A84B" opacity="0.5"/>
  <rect x="270" y="20" width="30" height="1" fill="#D4A84B" opacity="0.5"/>
  <rect x="299" y="20" width="1" height="30" fill="#D4A84B" opacity="0.5"/>
  <rect x="20" y="199" width="30" height="1" fill="#D4A84B" opacity="0.5"/>
  <rect x="20" y="170" width="1" height="30" fill="#D4A84B" opacity="0.5"/>
  <rect x="270" y="199" width="30" height="1" fill="#D4A84B" opacity="0.5"/>
  <rect x="299" y="170" width="1" height="30" fill="#D4A84B" opacity="0.5"/>
  <!-- label -->
  <text x="160" y="102" 
        text-anchor="middle" 
        font-family="Georgia, serif" 
        font-size="16" 
        fill="#D4A84B" 
        opacity="0.9"
        letter-spacing="3">Tarts</text>
  <text x="160" y="126" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-size="10" 
        fill="#D4A84B" 
        opacity="0.4"
        letter-spacing="4">SLICE CRAFT BAKERY</text>
</svg>