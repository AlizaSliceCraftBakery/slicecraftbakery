<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D2810;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D2810dd;stop-opacity:1" />
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <rect width="500" height="500" fill="url(#bg)"/>
  <rect width="500" height="500" fill="none" opacity="0.04" filter="url(#grain)"/>
  <!-- decorative lines -->
  <line x1="50.0" y1="250" x2="450.0" y2="250" stroke="#D4A84B" stroke-width="0.5" opacity="0.3"/>
  <line x1="250" y1="75.0" x2="250" y2="425.0" stroke="#D4A84B" stroke-width="0.5" opacity="0.15"/>
  <!-- corner accents -->
  <rect x="20" y="20" width="30" height="1" fill="#D4A84B" opacity="0.5"/>
  <rect x="20" y="20" width="1" height="30" fill="#D4A84B" opacity="0.5"/>
  <rect x="450" y="20" width="30" height="1" fill="#D4A84B" opacity="0.5"/>
  <rect x="479" y="20" width="1" height="30" fill="#D4A84B" opacity="0.5"/>
  <rect x="20" y="479" width="30" height="1" fill="#D4A84B" opacity="0.5"/>
  <rect x="20" y="450" width="1" height="30" fill="#D4A84B" opacity="0.5"/>
  <rect x="450" y="479" width="30" height="1" fill="#D4A84B" opacity="0.5"/>
  <rect x="479" y="450" width="1" height="30" fill="#D4A84B" opacity="0.5"/>
  <!-- label -->
  <text x="250" y="238" 
        text-anchor="middle" 
        font-family="Georgia, serif" 
        font-size="25" 
        fill="#D4A84B" 
        opacity="0.9"
        letter-spacing="3">Cheesecake</text>
  <text x="250" y="275" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-size="14" 
        fill="#D4A84B" 
        opacity="0.4"
        letter-spacing="4">SLICE CRAFT BAKERY</text>
</svg>