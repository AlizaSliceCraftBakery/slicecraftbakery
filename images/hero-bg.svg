<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D2810;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D2810dd;stop-opacity:1" />
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="none" opacity="0.04" filter="url(#grain)"/>
  <!-- decorative lines -->
  <line x1="160.0" y1="450" x2="1440.0" y2="450" stroke="#D4A84B" stroke-width="0.5" opacity="0.3"/>
  <line x1="800" y1="135.0" x2="800" y2="765.0" stroke="#D4A84B" stroke-width="0.5" opacity="0.15"/>
  <!-- corner accents -->
  <rect x="20" y="20" width="30" height="1" fill="#D4A84B" opacity="0.5"/>
  <rect x="20" y="20" width="1" height="30" fill="#D4A84B" opacity="0.5"/>
  <rect x="1550" y="20" width="30" height="1" fill="#D4A84B" opacity="0.5"/>
  <rect x="1579" y="20" width="1" height="30" fill="#D4A84B" opacity="0.5"/>
  <rect x="20" y="879" width="30" height="1" fill="#D4A84B" opacity="0.5"/>
  <rect x="20" y="850" width="1" height="30" fill="#D4A84B" opacity="0.5"/>
  <rect x="1550" y="879" width="30" height="1" fill="#D4A84B" opacity="0.5"/>
  <rect x="1579" y="850" width="1" height="30" fill="#D4A84B" opacity="0.5"/>
  <!-- label -->
  <text x="800" y="436" 
        text-anchor="middle" 
        font-family="Georgia, serif" 
        font-size="28" 
        fill="#D4A84B" 
        opacity="0.9"
        letter-spacing="3">Slice Craft Bakery</text>
  <text x="800" y="478" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-size="16" 
        fill="#D4A84B" 
        opacity="0.4"
        letter-spacing="4">SLICE CRAFT BAKERY</text>
</svg>