<svg xmlns="http://www.w3.org/2000/svg" width="600" height="480" viewBox="0 0 600 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D2810;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D2810dd;stop-opacity:1" />
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <rect width="600" height="480" fill="url(#bg)"/>
  <rect width="600" height="480" fill="none" opacity="0.04" filter="url(#grain)"/>
  <!-- decorative lines -->
  <line x1="60.0" y1="240" x2="540.0" y2="240" stroke="#D4A84B" stroke-width="0.5" opacity="0.3"/>
  <line x1="300" y1="72.0" x2="300" y2="408.0" stroke="#D4A84B" stroke-width="0.5" opacity="0.15"/>
  <!-- corner accents -->
  <rect x="20" y="20" width="30" height="1" fill="#D4A84B" opacity="0.5"/>
  <rect x="20" y="20" width="1" height="30" fill="#D4A84B" opacity="0.5"/>
  <rect x="550" y="20" width="30" height="1" fill="#D4A84B" opacity="0.5"/>
  <rect x="579" y="20" width="1" height="30" fill="#D4A84B" opacity="0.5"/>
  <rect x="20" y="459" width="30" height="1" fill="#D4A84B" opacity="0.5"/>
  <rect x="20" y="430" width="1" height="30" fill="#D4A84B" opacity="0.5"/>
  <rect x="550" y="459" width="30" height="1" fill="#D4A84B" opacity="0.5"/>
  <rect x="579" y="430" width="1" height="30" fill="#D4A84B" opacity="0.5"/>
  <!-- label -->
  <text x="300" y="226" 
        text-anchor="middle" 
        font-family="Georgia, serif" 
        font-size="28" 
        fill="#D4A84B" 
        opacity="0.9"
        letter-spacing="3">Basque Cheesecake</text>
  <text x="300" y="268" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-size="16" 
        fill="#D4A84B" 
        opacity="0.4"
        letter-spacing="4">SLICE CRAFT BAKERY</text>
</svg>